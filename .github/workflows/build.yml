name: Build Check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Build Rspeedy
        run: npx rspeedy build

      - run: cd website && npm install

      - name: Build Website
        run: cd website && npx rsbuild build
